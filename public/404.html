<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Adrastea</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #cdd6f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: 4rem;
      font-weight: 700;
      color: #888;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .message {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 2rem;
    }
    .link {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      background: #555;
      color: #eee;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .link:hover {
      background: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <p class="message">お探しのページは見つかりませんでした</p>
    <a href="/" class="link">トップに戻る</a>
  </div>
</body>
</html>
